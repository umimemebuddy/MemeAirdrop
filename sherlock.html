<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sherlock - Username Search | MEMEBUDDY</title>
    <meta name="description" content="Search usernames across 479 social platforms">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Orbitron', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #00ff41;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #00ff41;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            font-size: 1.2rem;
            font-family: 'Orbitron', monospace;
            background: #111;
            border: 2px solid #00ff41;
            color: #00ff41;
            border-radius: 8px;
        }
        input::placeholder { color: #444; }
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-family: 'Orbitron', monospace;
            background: #00ff41;
            border: none;
            color: #000;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #00cc33; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        .status {
            text-align: center;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            display: none;
        }
        .status.pending { background: #1a1a2e; border: 1px solid #ffaa00; color: #ffaa00; display: block; }
        .status.complete { background: #1a1a2e; border: 1px solid #00ff41; display: block; }
        .status.error { background: #1a1a2e; border: 1px solid #ff0041; color: #ff0041; display: block; }
        .results {
            margin-top: 20px;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            margin: 5px 0;
            background: #111;
            border-radius: 4px;
            border-left: 3px solid #00ff41;
        }
        .result-item a {
            color: #00ff41;
            text-decoration: none;
        }
        .result-item a:hover { text-decoration: underline; }
        .platform { font-weight: bold; }
        .stats {
            text-align: center;
            margin-top: 20px;
            color: #888;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #00ff41;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 SHERLOCK</h1>
        <p class="subtitle">Search usernames across 479 social platforms</p>
        
        <div class="search-box">
            <input type="text" id="username" placeholder="Enter username..." autocomplete="off">
            <button id="searchBtn" onclick="search()">Search</button>
        </div>
        
        <div id="status" class="status"></div>
        
        <div id="results" class="results"></div>
        
        <div id="stats" class="stats"></div>
        
        <a href="/" class="back-link">← Back to MEMEBUDDY</a>
    </div>
    
    <script>
        const API = '/api/sherlock';
        let pollInterval = null;
        
        async function search() {
            const username = document.getElementById('username').value.trim();
            if (!username) return;
            
            const btn = document.getElementById('searchBtn');
            const status = document.getElementById('status');
            const results = document.getElementById('results');
            const stats = document.getElementById('stats');
            
            btn.disabled = true;
            btn.textContent = 'Searching...';
            results.innerHTML = '';
            stats.innerHTML = '';
            
            try {
                const res = await fetch(`${API}/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                const data = await res.json();
                
                if (!data.success) {
                    status.className = 'status error';
                    status.textContent = data.error || 'Error';
                    btn.disabled = false;
                    btn.textContent = 'Search';
                    return;
                }
                
                status.className = 'status pending';
                status.textContent = `⏳ Job submitted (${data.jobId}). Results will appear in ~1-2 minutes...`;
                
                // Poll for results
                pollInterval = setInterval(() => pollResults(data.jobId), 5000);
                setTimeout(() => pollResults(data.jobId), 2000); // First check after 2s
                
            } catch (e) {
                status.className = 'status error';
                status.textContent = 'Network error';
                btn.disabled = false;
                btn.textContent = 'Search';
            }
        }
        
        async function pollResults(jobId) {
            try {
                const res = await fetch(`${API}/results/${jobId}`);
                const data = await res.json();
                
                if (data.status === 'pending') return;
                
                clearInterval(pollInterval);
                
                const btn = document.getElementById('searchBtn');
                const status = document.getElementById('status');
                const results = document.getElementById('results');
                const stats = document.getElementById('stats');
                
                btn.disabled = false;
                btn.textContent = 'Search';
                
                if (data.status === 'complete') {
                    status.className = 'status complete';
                    status.textContent = `✅ Search complete`;
                    
                    const found = data.results.filter(r => r.found);
                    const notFound = data.results.filter(r => !r.found);
                    
                    results.innerHTML = found.map(r => `
                        <div class="result-item">
                            <span class="platform">${r.platform}</span>
                            <a href="${r.url}" target="_blank">${r.url}</a>
                        </div>
                    `).join('');
                    
                    stats.innerHTML = `Found: <strong>${found.length}</strong> | Not found: ${notFound.length} | Total: ${data.results.length}`;
                } else if (data.status === 'error') {
                    status.className = 'status error';
                    status.textContent = `❌ Error: ${data.error}`;
                }
            } catch (e) {
                console.error('Poll error:', e);
            }
        }
        
        document.getElementById('username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') search();
        });
    </script>
</body>
</html>
