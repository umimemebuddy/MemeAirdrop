<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, height=630">
    <title>MEMEBUDDY OG Image</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            width: 1200px;
            height: 630px;
            background: #0A0A0F;
            font-family: 'Orbitron', sans-serif;
            position: relative;
            overflow: hidden;
        }
        
        /* Cyberpunk grid */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(0, 255, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 0, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        
        /* Scanlines */
        body::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.1) 51%, transparent 51%);
            background-size: 100% 4px;
        }
        
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }
        
        .logo {
            font-size: 80px;
            font-weight: 900;
            background: linear-gradient(135deg, #FFD700, #FF6B00, #BF00FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5)); }
            50% { filter: drop-shadow(0 0 40px rgba(255, 215, 0, 0.8)); }
        }
        
        .title {
            font-size: 48px;
            font-weight: 700;
            color: #00FFFF;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            margin-bottom: 15px;
            letter-spacing: 5px;
        }
        
        .subtitle {
            font-size: 28px;
            color: #00FF88;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        
        .tagline {
            font-size: 20px;
            color: #FFD700;
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .cta {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #BF00FF, #00FFFF);
            padding: 20px 50px;
            border-radius: 10px;
            animation: pulse 1.5s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(191, 0, 255, 0.5);
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .coins {
            position: absolute;
            font-size: 50px;
            opacity: 0.3;
        }
        
        .coin-1 { top: 50px; left: 80px; }
        .coin-2 { top: 80px; right: 100px; }
        .coin-3 { bottom: 80px; left: 120px; }
        .coin-4 { bottom: 50px; right: 80px; }
        
        .lobster {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 60px;
            animation: bounce 1s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="coins coin-1">🐕</div>
    <div class="coins coin-2">🐸</div>
    <div class="coins coin-3">🦊</div>
    <div class="coins coin-4">🐶</div>
    
    <div class="container">
        <div class="logo">🦞 MEMEBUDDY</div>
        <div class="title">SPIN TO WIN!</div>
        <div class="subtitle">Free Meme Coin Airdrop</div>
        <div class="tagline">
            <span>No Deposit</span>
            <span>•</span>
            <span>No Risk</span>
            <span>•</span>
            <span>100% Free</span>
        </div>
        <div class="cta">🎰 Spin Now →</div>
    </div>
    
    <div class="lobster">🦞</div>
</body>
</html>
